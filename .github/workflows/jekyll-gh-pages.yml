name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  security-events: write  # Required for uploading SARIF results

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Security scan job - runs independently, doesn't block deploy
  kics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create KICS results dir
        run: mkdir -p kics-results

      - name: Run KICS scan
        uses: checkmarx/kics-github-action@v2.1.19
        with:
          path: '.'
          output_path: kics-results
          output_formats: 'json,sarif'
          fail_on: high,medium          # Only fail on HIGH/MEDIUM, not LOW/INFO
          ignore_on_exit: results       # Don't fail the workflow on findings, just report
          exclude_paths: "_site,pdfs"   # Skip build output directories

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()                    # Upload even if scan found issues
        with:
          sarif_file: kics-results/results.sarif

      - name: Upload full KICS results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kics-results
          path: kics-results/results.json

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: source
          path: |
            **/*.md
            !_site/**

  export:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download source artifact
        uses: actions/download-artifact@v4
        with:
          name: source
          path: source

      - name: Update and do things
        run: sudo apt-get update -y 
      - name: Install pandoc and wkhtmltopdf
        run: sudo apt-get install -y pandoc wkhtmltopdf

      - name: Generate PDFs from Markdown
        run: |
          set -e
          mkdir -p pdfs
          find source -name "*.md" | while read -r f; do
            rel="${f#source/}"
            out="pdfs/${rel%.*}.pdf"
            mkdir -p "$(dirname "$out")"
            echo "Converting $f -> $out"
            pandoc "$f" -o "$out" --pdf-engine=wkhtmltopdf
          done

      - name: Upload PDFs artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdfs
          path: pdfs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
